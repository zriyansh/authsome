<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280">
    <title>{% block title %}Authsome{% endblock %} · Authsome</title>
    <link rel="stylesheet" href="/ui/static/style.css">
</head>
<body>
    <aside class="sidebar">
        <div class="brand">Authsome</div>
        <nav class="nav-primary">
            <a class="nav-item {% if page == 'overview' %}active{% endif %}" href="/ui/">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <rect x="3" y="3" width="7" height="7" rx="1.5"/>
                    <rect x="14" y="3" width="7" height="7" rx="1.5"/>
                    <rect x="3" y="14" width="7" height="7" rx="1.5"/>
                    <rect x="14" y="14" width="7" height="7" rx="1.5"/>
                </svg>
                <span>Overview</span>
            </a>
            <a class="nav-item {% if page == 'connections' %}active{% endif %}" href="/ui/connections">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="6" cy="12" r="2.5"/>
                    <circle cx="18" cy="6" r="2.5"/>
                    <circle cx="18" cy="18" r="2.5"/>
                    <path d="M8.2 11l7.6-4M8.2 13l7.6 4"/>
                </svg>
                <span>Connections</span>
            </a>
            <a class="nav-item disabled" href="#" aria-disabled="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M7 3h7l5 5v13H7z"/>
                    <path d="M14 3v5h5"/>
                    <path d="M9 13h7M9 17h5"/>
                </svg>
                <span>Audit Logs</span>
            </a>
        </nav>
        <div class="nav-spacer"></div>
        <nav class="nav-secondary">
            <a class="nav-item" href="https://authsome.mbajaj.me" target="_blank" rel="noreferrer">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M5 4h11a3 3 0 0 1 3 3v13H8a3 3 0 0 1-3-3z"/>
                    <path d="M5 17a3 3 0 0 1 3-3h11"/>
                </svg>
                <span>Docs</span>
            </a>
            <a class="nav-item" href="https://github.com/manojbajaj95/authsome/issues" target="_blank" rel="noreferrer">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="9"/>
                    <path d="M9.5 9.5a2.5 2.5 0 1 1 3.6 2.2c-.7.4-1.1 1-1.1 1.8"/>
                    <circle cx="12" cy="17" r="0.6" fill="currentColor"/>
                </svg>
                <span>Support</span>
            </a>
        </nav>
        <div class="brand-foot">v{{ version }}</div>
    </aside>

    <main class="main">
        <div class="topbar">
            <div class="topbar-actions">
                <a class="icon-btn" href="https://github.com/manojbajaj95/authsome" target="_blank" rel="noreferrer" aria-label="Open Authsome on GitHub" title="GitHub">
                    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                        <path d="M12 2C6.48 2 2 6.58 2 12.22c0 4.52 2.87 8.35 6.84 9.7.5.1.68-.22.68-.49 0-.24-.01-1.04-.01-1.89-2.78.62-3.37-1.22-3.37-1.22-.45-1.18-1.11-1.49-1.11-1.49-.91-.64.07-.63.07-.63 1 .07 1.53 1.06 1.53 1.06.9 1.56 2.36 1.11 2.93.85.09-.66.35-1.11.63-1.37-2.22-.26-4.56-1.14-4.56-5.05 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.71 0 0 .84-.27 2.75 1.05A9.4 9.4 0 0 1 12 6.94c.85 0 1.7.12 2.5.35 1.91-1.32 2.75-1.05 2.75-1.05.55 1.41.2 2.45.1 2.71.64.72 1.03 1.63 1.03 2.75 0 3.92-2.34 4.78-4.57 5.04.36.32.68.94.68 1.9 0 1.37-.01 2.47-.01 2.8 0 .27.18.6.69.49A10.1 10.1 0 0 0 22 12.22C22 6.58 17.52 2 12 2z"/>
                    </svg>
                </a>
                <a class="icon-btn pypi-mark" href="https://pypi.org/project/authsome/" target="_blank" rel="noreferrer" aria-label="Open Authsome on PyPI" title="PyPI">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M12 3 4.5 7.25v9.5L12 21l7.5-4.25v-9.5L12 3z"/>
                        <path d="M4.5 7.25 12 11.5l7.5-4.25"/>
                        <path d="M12 11.5V21"/>
                    </svg>
                </a>
            </div>
        </div>

        <div class="page">
            {% block content %}{% endblock %}
        </div>
    </main>

    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="/ui/static/app.js"></script>
</body>
</html>
