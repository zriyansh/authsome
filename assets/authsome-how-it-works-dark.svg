<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 520" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">authsome architecture diagram</title>
  <desc id="desc">AI agents route through authsome's CLI, local auth proxy, and encrypted vault before reaching external services.</desc>

  <style>
    text {
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }
  </style>

  <defs>
    <linearGradient id="stage" x1="0" y1="0" x2="1160" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#09090B"/>
      <stop offset="0.52" stop-color="#000000"/>
      <stop offset="1" stop-color="#09090B"/>
    </linearGradient>

    <radialGradient id="core-haze" cx="50%" cy="50%" r="48%">
      <stop offset="0" stop-color="#172A4A" stop-opacity="0.16"/>
      <stop offset="0.46" stop-color="#4A241D" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#09090B" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="glass-border" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="0.6" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.03"/>
    </linearGradient>

    <linearGradient id="module-fill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.085"/>
      <stop offset="0.46" stop-color="#FFFFFF" stop-opacity="0.034"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.012"/>
    </linearGradient>

    <linearGradient id="auth-border" x1="34" y1="180" x2="1126" y2="342" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6D8FD6" stop-opacity="0.46"/>
      <stop offset="0.36" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="0.66" stop-color="#CC8066" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#334155" stop-opacity="0.38"/>
    </linearGradient>

    <linearGradient id="proxy-fill" x1="422" y1="225" x2="738" y2="318" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#172A4A" stop-opacity="0.28"/>
      <stop offset="0.52" stop-color="#FFFFFF" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#4A241D" stop-opacity="0.18"/>
    </linearGradient>

    <linearGradient id="blue-arrow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3B5F9F" stop-opacity="0.2"/>
      <stop offset="0.45" stop-color="#6D8FD6" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.48"/>
    </linearGradient>

    <linearGradient id="copper-arrow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4A241D" stop-opacity="0.22"/>
      <stop offset="0.45" stop-color="#CC8066" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.36"/>
    </linearGradient>

    <linearGradient id="steel-arrow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#162033" stop-opacity="0.24"/>
      <stop offset="0.5" stop-color="#334155" stop-opacity="0.86"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.3"/>
    </linearGradient>

    <linearGradient id="mixed-arrow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6D8FD6" stop-opacity="0.72"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#CC8066" stop-opacity="0.72"/>
    </linearGradient>

    <filter id="module-shadow" x="-8%" y="-18%" width="116%" height="136%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.42"/>
    </filter>

    <filter id="arrow-glow" x="-80%" y="-50%" width="260%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="core-glow" x="-18%" y="-28%" width="136%" height="156%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#6D8FD6" flood-opacity="0.12" result="blue"/>
      <feComposite in="blue" in2="blur" operator="in" result="blueGlow"/>
      <feFlood flood-color="#CC8066" flood-opacity="0.1" result="copper"/>
      <feComposite in="copper" in2="blur" operator="in" result="copperGlow"/>
      <feMerge>
        <feMergeNode in="blueGlow"/>
        <feMergeNode in="copperGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M1.3 1.6 L8.2 5 L1.3 8.4" stroke="#6D8FD6" stroke-opacity="0.9" stroke-width="1.25" fill="none" stroke-linecap="square" stroke-linejoin="miter"/>
    </marker>

    <marker id="arrow-copper" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M1.3 1.6 L8.2 5 L1.3 8.4" stroke="#CC8066" stroke-opacity="0.9" stroke-width="1.25" fill="none" stroke-linecap="square" stroke-linejoin="miter"/>
    </marker>

    <marker id="arrow-steel" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M1.3 1.6 L8.2 5 L1.3 8.4" stroke="#334155" stroke-opacity="0.9" stroke-width="1.25" fill="none" stroke-linecap="square" stroke-linejoin="miter"/>
    </marker>
  </defs>

  <rect width="1160" height="520" fill="url(#stage)"/>
  <rect width="1160" height="520" fill="url(#core-haze)"/>

  <text x="580" y="74" text-anchor="middle" fill="#71717A" font-size="10" font-weight="500" letter-spacing="2.4">AI AGENTS</text>

  <g id="agents" filter="url(#module-shadow)">
    <rect x="52" y="92" width="192" height="54" rx="2" fill="url(#module-fill)" stroke="url(#glass-border)"/>
    <text x="148" y="125" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="500">Claude Code</text>

    <rect x="268" y="92" width="192" height="54" rx="2" fill="url(#module-fill)" stroke="url(#glass-border)"/>
    <text x="364" y="125" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="500">Codex</text>

    <rect x="484" y="92" width="192" height="54" rx="2" fill="url(#module-fill)" stroke="url(#glass-border)"/>
    <text x="580" y="125" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="500">OpenClaw</text>

    <rect x="700" y="92" width="192" height="54" rx="2" fill="url(#module-fill)" stroke="url(#glass-border)"/>
    <text x="796" y="125" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="500">Hermes</text>

    <rect x="916" y="92" width="192" height="54" rx="2" fill="url(#module-fill)" stroke="url(#glass-border)"/>
    <text x="1012" y="125" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="500">Any Agent</text>
  </g>

  <g filter="url(#arrow-glow)" stroke-width="1.15" stroke-linecap="square">
    <line x1="148" y1="146" x2="148" y2="180" stroke="url(#blue-arrow)"/>
    <line x1="148" y1="146" x2="148" y2="163" stroke="url(#blue-arrow)" marker-end="url(#arrow-blue)"/>
    <line x1="364" y1="146" x2="364" y2="180" stroke="url(#steel-arrow)"/>
    <line x1="364" y1="146" x2="364" y2="163" stroke="url(#steel-arrow)" marker-end="url(#arrow-steel)"/>
    <line x1="580" y1="146" x2="580" y2="180" stroke="url(#mixed-arrow)"/>
    <line x1="580" y1="146" x2="580" y2="163" stroke="url(#mixed-arrow)" marker-end="url(#arrow-blue)"/>
    <line x1="796" y1="146" x2="796" y2="180" stroke="url(#copper-arrow)"/>
    <line x1="796" y1="146" x2="796" y2="163" stroke="url(#copper-arrow)" marker-end="url(#arrow-copper)"/>
    <line x1="1012" y1="146" x2="1012" y2="180" stroke="url(#steel-arrow)"/>
    <line x1="1012" y1="146" x2="1012" y2="163" stroke="url(#steel-arrow)" marker-end="url(#arrow-steel)"/>
  </g>

  <g id="authsome-zone" filter="url(#core-glow)">
    <rect x="34" y="180" width="1092" height="162" rx="4" fill="#FFFFFF" fill-opacity="0.032" stroke="url(#auth-border)"/>
    <text x="580" y="207" text-anchor="middle" fill="#CC8066" font-size="10" font-weight="500" letter-spacing="2.8">AUTHSOME</text>

    <g filter="url(#module-shadow)">
      <rect x="72" y="232" width="300" height="66" rx="2" fill="#FFFFFF" fill-opacity="0.045" stroke="url(#glass-border)"/>
      <text x="222" y="259" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="500">CLI</text>
      <text x="222" y="280" text-anchor="middle" fill="#B4B5BD" font-size="11" font-weight="400">Login, export, and run commands</text>

      <rect x="422" y="220" width="316" height="90" rx="2" fill="url(#proxy-fill)" stroke="#6D8FD6" stroke-opacity="0.4"/>
      <rect x="422" y="220" width="316" height="90" rx="2" fill="none" stroke="#CC8066" stroke-opacity="0.24"/>
      <text x="580" y="257" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="500">Local Auth Proxy</text>
      <text x="580" y="279" text-anchor="middle" fill="#B4B5BD" font-size="11" font-weight="400">Injects fresh credentials at request time</text>
      <text x="580" y="295" text-anchor="middle" fill="#71717A" font-size="9" font-weight="500" letter-spacing="1.2">CONTROLLED HANDOFF</text>

      <rect x="788" y="232" width="300" height="66" rx="2" fill="#FFFFFF" fill-opacity="0.045" stroke="url(#glass-border)"/>
      <text x="938" y="259" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="500">Encrypted Vault</text>
      <text x="938" y="280" text-anchor="middle" fill="#B4B5BD" font-size="11" font-weight="400">Local storage and token refresh</text>
    </g>

    <g filter="url(#arrow-glow)" stroke-width="1.15" stroke-linecap="square">
      <line x1="372" y1="265" x2="422" y2="265" stroke="url(#steel-arrow)"/>
      <line x1="372" y1="265" x2="397" y2="265" stroke="url(#steel-arrow)" marker-end="url(#arrow-steel)"/>
      <line x1="738" y1="265" x2="788" y2="265" stroke="url(#copper-arrow)"/>
      <line x1="738" y1="265" x2="763" y2="265" stroke="url(#copper-arrow)" marker-end="url(#arrow-copper)"/>
    </g>
  </g>

  <g filter="url(#arrow-glow)" stroke-width="1.15" stroke-linecap="square">
    <line x1="148" y1="342" x2="148" y2="416" stroke="url(#steel-arrow)"/>
    <line x1="148" y1="342" x2="148" y2="379" stroke="url(#steel-arrow)" marker-end="url(#arrow-steel)"/>
    <line x1="364" y1="342" x2="364" y2="416" stroke="url(#blue-arrow)"/>
    <line x1="364" y1="342" x2="364" y2="379" stroke="url(#blue-arrow)" marker-end="url(#arrow-blue)"/>
    <line x1="580" y1="342" x2="580" y2="416" stroke="url(#mixed-arrow)"/>
    <line x1="580" y1="342" x2="580" y2="379" stroke="url(#mixed-arrow)" marker-end="url(#arrow-copper)"/>
    <line x1="796" y1="342" x2="796" y2="416" stroke="url(#copper-arrow)"/>
    <line x1="796" y1="342" x2="796" y2="379" stroke="url(#copper-arrow)" marker-end="url(#arrow-copper)"/>
    <line x1="1012" y1="342" x2="1012" y2="416" stroke="url(#steel-arrow)"/>
    <line x1="1012" y1="342" x2="1012" y2="379" stroke="url(#steel-arrow)" marker-end="url(#arrow-steel)"/>
  </g>

  <text x="580" y="397" text-anchor="middle" fill="#71717A" font-size="10" font-weight="500" letter-spacing="2.4">EXTERNAL SERVICES</text>

  <g id="services" filter="url(#module-shadow)">
    <rect x="52" y="416" width="192" height="54" rx="2" fill="url(#module-fill)" stroke="url(#glass-border)"/>
    <text x="148" y="449" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="500">Stripe</text>

    <rect x="268" y="416" width="192" height="54" rx="2" fill="url(#module-fill)" stroke="url(#glass-border)"/>
    <text x="364" y="449" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="500">GitHub</text>

    <rect x="484" y="416" width="192" height="54" rx="2" fill="url(#module-fill)" stroke="url(#glass-border)"/>
    <text x="580" y="449" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="500">OpenAI</text>

    <rect x="700" y="416" width="192" height="54" rx="2" fill="url(#module-fill)" stroke="url(#glass-border)"/>
    <text x="796" y="449" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="500">Gmail</text>

    <rect x="916" y="416" width="192" height="54" rx="2" fill="url(#module-fill)" stroke="url(#glass-border)"/>
    <text x="1012" y="449" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="500">Any App</text>
  </g>
</svg>
